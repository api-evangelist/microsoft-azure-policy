apis:
  - name: Azure Policy REST API
    description: >-
      Azure Policy REST API provides management of policy definitions, assignments,
      and compliance states for enforcing organizational standards across Azure
      resources. It supports creating custom policies, initiatives, exemptions, and
      querying compliance results.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://learn.microsoft.com/en-us/rest/api/policy/
